# MOSLock V3 — YOLOv8 Dataset Configuration
# Mapped Out Solutions® | mos | Lock®
# 25 effective detection classes for mobile substation isolation verification
# Per: Glencore GCAA Fatal Hazard Protocol 7 / AS 4871.1

# ── Paths (update to your absolute dataset path before training) ──────────
path:   ./dataset          # root dataset directory (relative to this file)
train:  images/train       # training images
val:    images/val         # validation images
test:   images/test        # test images (optional)

# ── Class count ────────────────────────────────────────────────────────────
nc: 25

# ── Class names — ORDER IS FIXED; ID matches list index ───────────────────
#
# Locks (2)
#   0  personal_lock    — individual worker padlock (colour-coded: red/blue/yellow)
#   1  permit_lock      — permit holder's lock (larger, numbered, on lock box)
#
# Isolation Points (10: 5 types × 2 states)
#   2  circuit_breaker_open    | 3  circuit_breaker_closed
#   4  isolator_switch_open    | 5  isolator_switch_closed
#   6  fuse_withdrawn          | 7  fuse_inserted
#   8  earth_switch_applied    | 9  earth_switch_removed
#  10  disconnect_open         | 11 disconnect_closed
#
# Compartments (10)
#  12  compartment_1   HV Incoming
#  13  compartment_2   Transformer
#  14  compartment_3   LV Outgoing
#  15  compartment_4   Control
#  16  compartment_5   Auxiliary
#  17  compartment_6   Bus Section
#  18  compartment_7   Metering
#  19  compartment_8   Protection Relay
#  20  compartment_9   Cable Termination
#  21  compartment_10  Earth Bar
#
# Live Line Indicators (3)
#  22  indicator_lit     — voltage present (FAIL condition)
#  23  indicator_off     — no voltage (PASS condition)
#  24  indicator_fault   — damaged/obscured → mandatory manual verification (STOP)

names:
  0:  personal_lock
  1:  permit_lock
  2:  circuit_breaker_open
  3:  circuit_breaker_closed
  4:  isolator_switch_open
  5:  isolator_switch_closed
  6:  fuse_withdrawn
  7:  fuse_inserted
  8:  earth_switch_applied
  9:  earth_switch_removed
  10: disconnect_open
  11: disconnect_closed
  12: compartment_1
  13: compartment_2
  14: compartment_3
  15: compartment_4
  16: compartment_5
  17: compartment_6
  18: compartment_7
  19: compartment_8
  20: compartment_9
  21: compartment_10
  22: indicator_lit
  23: indicator_off
  24: indicator_fault

# ── Notes ──────────────────────────────────────────────────────────────────
# • Locks and isolation-point OPEN states are higher priority classes.
#   Weigh their loss higher in train.py if recall is low after initial run.
# • indicator_fault has highest safety consequence — tune confidence threshold
#   separately or use a lower threshold for this class specifically.
# • Compartment classes are large bounding boxes covering whole substation
#   sections; isolation points are small; balance with mosaic augmentation.
# • Synthetic images generated by generate_synthetic_samples.py seed class 0–24.
#   Replace with real annotated photos from bootstrap_annotations.py output
#   before submitting to CVAT/LabelImg for human review.
